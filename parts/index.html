<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Ridge Runner Gear Replacement Parts | Repair & Upgrade Your Gear</title>

<meta name="description" content="Find Ridge Runner Gear replacement parts to repair, maintain, or upgrade your gear. Keep your backpacking tools, Rocket Reel, and outdoor equipment running strong." />
<meta name="author" content="Ridge Runner Gear">

<meta name="robots" content="index, follow">

<meta property="og:title" content="Ridge Runner Gear Replacement Parts">
<meta property="og:description" content="Browse replacement parts for Ridge Runner Gear products including repair components, upgrades, and accessories to keep your gear in the field.">
<meta property="og:image" content="https://ridgerunnergear.net/assets/images/rrg_logo.png">
<meta property="og:url" content="https://ridgerunnergear.net/parts.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Ridge Runner Gear">

<link rel="canonical" href="https://ridgerunnergear.net/parts.html">

<link rel="icon" type="image/png" href="/favicon.png">

<link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <div class="logo-wrap">
        <img src="../assets/images/rrg_logo.png" alt="Ridge Runner Gear logo" class="site-logo" />
      </div>
      <h1 class="brand">Replacement Parts</h1>

      <p class="page-intro">
        Spare parts, hardware kits, and support items for Ridge Runner Gear products.
      </p>

      <nav class="top-nav">
        <a href="../">Home</a>
        <a href="../products/">Products</a>
        <a href="../parts/" class="active">Replacement Parts</a>
        <a href="../manuals/">Manuals</a>
        <a href="https://www.etsy.com/shop/YOURSHOPNAME" target="_blank">Shop on Etsy</a>
        <a href="../blog/">Blog</a>
        <a href="../about/">About</a>
        <a href="../contact/">Contact</a>
      </nav>

      <div class="search-wrap">
        <input
          type="text"
          id="siteSearch"
          class="search-input"
          placeholder="Search replacement parts..."
        />
      </div>
    </header>

    <section class="card-grid" id="partsGrid"></section>

    <footer>
      Ridge Runner Gear Replacement Parts • Keep it running
    </footer>
  </div>

  <script src="../assets/js/parts-data.js"></script>
  <script>
    const partsGrid = document.getElementById("partsGrid");

    function buildPartCard(part) {
      return `
        <div class="card product-card" data-search="${part.search}">
          <img src="${part.image}" alt="${part.title}" />
          <h3>${part.title}</h3>
          <p>${part.description}</p>
          <div class="button-row">
            <a class="btn btn-manual" href="${part.manual}" target="_blank">Field Manual</a>
            <a class="btn btn-etsy" href="${part.etsy}" target="_blank">Buy on Etsy</a>
          </div>
        </div>
      `;
    }

    partsGrid.innerHTML = partsData.map(buildPartCard).join("");

    const searchInput = document.getElementById("siteSearch");

    searchInput.addEventListener("input", () => {
      const query = searchInput.value.trim().toLowerCase();
      const items = document.querySelectorAll(".product-card");

      items.forEach(item => {
        const text = item.getAttribute("data-search").toLowerCase();
        const title = item.querySelector("h3").textContent.toLowerCase();
        const match = text.includes(query) || title.includes(query);
        item.classList.toggle("hidden-card", !match);
      });
    });
  </script>
</body>
</html>
