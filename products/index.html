<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RRG Products</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <div class="logo-wrap">
        <img src="../assets/images/rrg_logo.png" alt="Ridge Runner Gear logo" class="site-logo" />
      </div>
      <h1 class="brand">Products</h1>

      <p class="page-intro">
        Browse current Ridge Runner Gear products with direct manual, parts, and Etsy links.
      </p>

      <nav class="top-nav">
        <a href="../">Home</a>
        <a href="../products/">Products</a>
        <a href="../parts/">Replacement Parts</a>
        <a href="../manuals/">Manuals</a>
        <a href="https://www.etsy.com/shop/YOURSHOPNAME" target="_blank">Shop on Etsy</a>
      </nav>

      <div class="search-wrap">
        <input
          type="text"
          id="siteSearch"
          class="search-input"
          placeholder="Search products..."
        />
      </div>
    </header>

    <section class="card-grid" id="productsGrid"></section>

    <footer>
      Ridge Runner Gear Products • Built to work • Linked to Etsy
    </footer>
  </div>

  <script src="../assets/js/products-data.js"></script>
  <script>
    const productsGrid = document.getElementById("productsGrid");

    function buildProductCard(product) {
      return `
        <div class="card product-card" data-search="${product.search}">
          <img src="${product.image}" alt="${product.title}" />
          <h3>${product.title}</h3>
          <p>${product.description}</p>
          <div class="button-row">
            <a class="btn btn-manual" href="${product.manual}" target="_blank">Manual</a>
            <a class="btn btn-parts" href="${product.parts}">Parts</a>
            <a class="btn btn-etsy" href="${product.etsy}" target="_blank">Buy on Etsy</a>
          </div>
        </div>
      `;
    }

    productsGrid.innerHTML = productsData.map(buildProductCard).join("");

    const searchInput = document.getElementById("siteSearch");

    searchInput.addEventListener("input", () => {
      const query = searchInput.value.trim().toLowerCase();
      const items = document.querySelectorAll(".product-card");

      items.forEach(item => {
        const text = item.getAttribute("data-search").toLowerCase();
        const title = item.querySelector("h3").textContent.toLowerCase();
        const match = text.includes(query) || title.includes(query);
        item.classList.toggle("hidden-card", !match);
      });
    });
  </script>
</body>
</html>
